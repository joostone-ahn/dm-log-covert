<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DM Log Converter - DM 로그 변환 도구</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .status-badge.success {
            background: #d4edda;
            color: #155724;
        }

        .status-badge.error {
            background: #f8d7da;
            color: #721c24;
        }

        .section-title {
            font-size: 1.3em;
            margin-bottom: 15px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .option-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option-group label {
            font-weight: 600;
            color: #555;
            font-size: 0.9em;
        }

        select, input[type="text"] {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        select:focus, input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .file-list {
            max-height: 400px;
            overflow-y: auto;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }

        .file-item:hover {
            background: #f8f9fa;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .file-name {
            font-weight: 600;
            color: #333;
        }

        .file-size {
            font-size: 0.85em;
            color: #888;
        }

        .file-ext {
            display: inline-block;
            padding: 2px 8px;
            background: #667eea;
            color: white;
            border-radius: 4px;
            font-size: 0.75em;
            font-weight: 600;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover:not(:disabled) {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.4);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result-box {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            background: #f8f9fa;
        }

        .result-box.success {
            background: #d4edda;
            border: 2px solid #c3e6cb;
        }

        .result-box.error {
            background: #f8d7da;
            border: 2px solid #f5c6cb;
        }

        .result-title {
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 15px 0;
        }

        .stat-item {
            text-align: center;
            padding: 15px;
            background: white;
            border-radius: 6px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }

        .log-box {
            background: #2d3748;
            color: #e2e8f0;
            padding: 15px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin-top: 15px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .options-grid {
                grid-template-columns: 1fr;
            }

            .btn-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔄 DM Log Converter</h1>
        </div>

        <div class="card">
            <div class="status-bar" id="statusBar">
                <div class="status-item">
                    <span>SCAT 상태:</span>
                    <span class="status-badge" id="scatStatus">확인 중...</span>
                </div>
                <div class="status-item">
                    <span>파일 수:</span>
                    <span id="fileCount">0</span>
                </div>
            </div>

            <div class="section-title">⚙️ 변환 옵션</div>
            <div class="options-grid">
                <div class="option-group">
                    <label for="layers">추출 레이어</label>
                    <input type="text" id="layers" value="rrc,nas" placeholder="예: rrc,nas,ip">
                </div>
                <div class="option-group">
                    <label>GSMTAPv3</label>
                    <div class="checkbox-group">
                        <input type="checkbox" id="gsmtapV3" checked>
                        <label for="gsmtapV3">GSMTAPv3 활성화 (5G NR)</label>
                    </div>
                </div>
            </div>

            <div class="section-title">📁 입력 파일 (/input)</div>
            <div class="file-list" id="fileList">
                <div class="empty-state">
                    <div class="empty-state-icon">📂</div>
                    <p>파일을 불러오는 중...</p>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="refreshFiles()">
                    🔄 파일 목록 새로고침
                </button>
                <button class="btn btn-success" onclick="convertBatch()" id="batchBtn" disabled>
                    ⚡ 일괄 변환
                </button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p id="loadingText">변환 중입니다. 잠시만 기다려주세요...</p>
                <div class="log-box" id="progressLog" style="display: none; margin-top: 15px; max-height: 300px; text-align: left;"></div>
            </div>

            <div class="result-box" id="resultBox"></div>
        </div>
    </div>

    <script>
        let files = [];

        // 초기화
        async function init() {
            await checkStatus();
            await loadFiles();
        }

        // 시스템 상태 확인
        async function checkStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                const scatStatus = document.getElementById('scatStatus');
                if (data.scat_installed) {
                    scatStatus.textContent = '정상';
                    scatStatus.className = 'status-badge success';
                } else {
                    scatStatus.textContent = '미설치';
                    scatStatus.className = 'status-badge error';
                }
            } catch (error) {
                console.error('상태 확인 실패:', error);
            }
        }

        // 파일 목록 로드
        async function loadFiles() {
            try {
                const response = await fetch('/api/files');
                const data = await response.json();
                
                files = data.files;
                document.getElementById('fileCount').textContent = data.total;
                
                renderFileList();
            } catch (error) {
                console.error('파일 목록 로드 실패:', error);
                showError('파일 목록을 불러올 수 없습니다.');
            }
        }

        // 파일 목록 렌더링
        function renderFileList() {
            const fileList = document.getElementById('fileList');
            const batchBtn = document.getElementById('batchBtn');
            
            if (files.length === 0) {
                fileList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>/input 디렉토리에 변환할 파일이 없습니다.</p>
                        <p style="font-size: 0.9em; color: #aaa; margin-top: 10px;">
                            지원 형식: .qmdl, .hdf, .dlf (Qualcomm), .sdm (Samsung)
                        </p>
                    </div>
                `;
                batchBtn.disabled = true;
                return;
            }

            batchBtn.disabled = false;
            
            fileList.innerHTML = files.map(file => `
                <div class="file-item">
                    <div class="file-info">
                        <div class="file-name">${file.name}</div>
                        <div class="file-size">${file.size_mb} MB • ${file.vendor}</div>
                    </div>
                    <span class="file-ext">${file.extension}</span>
                </div>
            `).join('');
        }

        // 파일 목록 새로고침
        async function refreshFiles() {
            await loadFiles();
            hideResult();
        }

        // 일괄 변환
        async function convertBatch() {
            if (files.length === 0) {
                alert('변환할 파일이 없습니다.');
                return;
            }

            if (!confirm(`${files.length}개의 파일을 일괄 변환하시겠습니까?`)) {
                return;
            }

            const layers = document.getElementById('layers').value;
            const gsmtapV3 = document.getElementById('gsmtapV3').checked;

            showLoading();
            hideResult();
            
            // 진행 로그 표시
            const progressLog = document.getElementById('progressLog');
            progressLog.style.display = 'block';
            progressLog.textContent = '변환 시작 중...\n';

            try {
                // 1. 변환 세션 시작
                const response = await fetch('/api/convert/batch', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        layers: layers,
                        gsmtap_v3: gsmtapV3
                    })
                });

                const { session_id } = await response.json();

                // 2. SSE로 진행 상황 수신
                const eventSource = new EventSource(`/api/convert/progress/${session_id}`);
                
                eventSource.onmessage = function(event) {
                    const data = JSON.parse(event.data);
                    
                    if (data.message) {
                        // 진행 메시지 추가
                        progressLog.textContent += data.message + '\n';
                        progressLog.scrollTop = progressLog.scrollHeight;
                    } else if (data.done) {
                        // 변환 완료
                        eventSource.close();
                        hideLoading();
                        
                        const result = data.result;
                        showSuccess(`
                            <div class="result-title">📊 일괄 변환 완료</div>
                            <div class="result-stats">
                                <div class="stat-item">
                                    <div class="stat-value">${result.total}</div>
                                    <div class="stat-label">전체</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-value" style="color: #28a745;">${result.success}</div>
                                    <div class="stat-label">성공</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-value" style="color: #dc3545;">${result.failed}</div>
                                    <div class="stat-label">실패</div>
                                </div>
                            </div>
                            <div class="log-box">${result.log}</div>
                        `);
                    } else if (data.error) {
                        // 에러 발생
                        eventSource.close();
                        hideLoading();
                        showError(`변환 중 오류가 발생했습니다: ${data.error}`);
                    }
                };
                
                eventSource.onerror = function(error) {
                    eventSource.close();
                    hideLoading();
                    showError('연결이 끊어졌습니다. 다시 시도해주세요.');
                };

            } catch (error) {
                hideLoading();
                showError(`일괄 변환 중 오류가 발생했습니다: ${error.message}`);
            }
        }

        // UI 헬퍼 함수
        function showLoading() {
            document.getElementById('loading').style.display = 'block';
        }

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('progressLog').style.display = 'none';
            document.getElementById('progressLog').textContent = '';
        }

        function showSuccess(html) {
            const resultBox = document.getElementById('resultBox');
            resultBox.className = 'result-box success';
            resultBox.innerHTML = html;
            resultBox.style.display = 'block';
        }

        function showError(html) {
            const resultBox = document.getElementById('resultBox');
            resultBox.className = 'result-box error';
            resultBox.innerHTML = html;
            resultBox.style.display = 'block';
        }

        function hideResult() {
            document.getElementById('resultBox').style.display = 'none';
        }

        // 페이지 로드 시 초기화
        init();
    </script>
</body>
</html>
